name: Release
on:
  workflow_dispatch:
    inputs:
      version:
        description: '0.0.0'
        required: false
        default: '0.0.1'

jobs:
  build-and-release:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x64
            rust-target: x86_64-pc-windows-msvc
          - arch: arm64
            rust-target: aarch64-pc-windows-msvc
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set version
        id: version
        shell: bash
        run: echo "VERSION=${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT

      - name: Bump version to ${{ steps.version.outputs.VERSION }}
        shell: pwsh
        run: |
          $v = "${{ steps.version.outputs.VERSION }}"
          $root = $env:GITHUB_WORKSPACE
          # package.json
          $pkgPath = Join-Path $root "package.json"
          $pkg = Get-Content $pkgPath -Raw | ConvertFrom-Json
          $pkg.version = $v
          $pkg | ConvertTo-Json -Depth 10 | Set-Content $pkgPath -Encoding utf8NoBOM
          # src-tauri/tauri.conf.json
          $tauriPath = Join-Path $root "src-tauri\tauri.conf.json"
          $tauri = Get-Content $tauriPath -Raw | ConvertFrom-Json
          $tauri.version = $v
          $tauri | ConvertTo-Json -Depth 10 | Set-Content $tauriPath -Encoding utf8NoBOM
          # src-tauri/Cargo.toml
          $cargoPath = Join-Path $root "src-tauri\Cargo.toml"
          $cargo = Get-Content $cargoPath -Raw
          $cargo = $cargo -replace '(?m)^(version\s*=\s*")[^"]*(")', "`${1}$v`${2}"
          Set-Content $cargoPath $cargo -Encoding utf8NoBOM -NoNewline
          Write-Host "Version synced to $v"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust-target }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"
          key: ${{ matrix.arch }}

      - name: Install dependencies
        run: npm ci

      - name: Build
        shell: bash
        run: npm run tauri build -- --target ${{ matrix.rust-target }}

      - name: Rename portable exe
        shell: pwsh
        run: |
          $v = "${{ steps.version.outputs.VERSION }}"
          $arch = "${{ matrix.arch }}"
          $src = "src-tauri/target/${{ matrix.rust-target }}/release/elegant-clipboard.exe"
          Copy-Item $src "ElegantClipboard_${v}_${arch}_portable.exe"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ElegantClipboard_${{ steps.version.outputs.VERSION }}_${{ matrix.arch }}
          path: ElegantClipboard_*_portable.exe
